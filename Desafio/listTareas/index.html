<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Lista de Tareas — Investigación Aplicada 1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
  <script src="codex.js" defer></script>
</head>
<body>
  <header>
    <h1>Lista de Tareas</h1>
  </header>
  <main>
    <section aria-labelledby="agregar-heading">
      <h2 id="agregar-heading">Agregar tarea</h2>
      <form id="form-agregar" autocomplete="off" novalidate>
        <label for="input-desc">Descripción de la tarea</label>
        <input
          id="input-desc"
          name="descripcion"
          type="text"
          placeholder="Escribe la descripción (solo letras y espacios, máx. 500)"
          maxlength="500"
          required
          aria-describedby="help-desc"
        />
        <button id="btn-agregar" type="submit">Agregar</button>
        <p id="help-desc">
          La adición se simula como una llamada a una API con latencia (async/await).
        </p>
      </form>
      <div id="status" role="status" aria-live="polite"></div>
    </section>
    <section aria-labelledby="lista-heading">
      <h2 id="lista-heading">Tareas</h2>
      <ul id="lista-tareas" aria-live="polite" aria-busy="false">
      </ul>
    </section>
  </main>
  <noscript>
    Necesitas habilitar JavaScript para usar esta aplicación.
  </noscript>
</body>
</html>
